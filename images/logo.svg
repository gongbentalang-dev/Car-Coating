<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .text-main {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      fill: white;
    }
    .text-sub {
      font-family: sans-serif;
      font-size: 14px;
      letter-spacing: 3px;
